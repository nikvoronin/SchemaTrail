name: Publish NuGet package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./SchemaTrail/SchemaTrail.csproj

      - name: Build
        run: dotnet build ./SchemaTrail/SchemaTrail.csproj -c Release --no-restore

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack ./SchemaTrail/SchemaTrail.csproj -c Release --no-build -o ./artifacts -p:PackageVersion="$VERSION"

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Push package
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://www.nuget.org/api/v2/package --skip-duplicate

      - name: Push symbols
        run: |
          if compgen -G "./artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push ./artifacts/*.snupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://www.nuget.org/api/v2/package --skip-duplicate
          else
            echo "No .snupkg files found, skipping symbols push."
          fi